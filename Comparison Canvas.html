<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Ashwin Murugan — Personal Website (3 directions)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Serif+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f0eee9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #29261b;
    }
    #root { min-height: 100vh; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Canvas + three directions, each in its own file -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="direction-a.jsx"></script>
  <script type="text/babel" src="direction-b.jsx"></script>
  <script type="text/babel" src="direction-c.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function PostIt({ children, style }) {
      return (
        <div
          style={{
            position: 'absolute',
            background: '#fef4a8',
            color: '#5a4a2a',
            padding: '12px 14px',
            fontFamily: 'JetBrains Mono, ui-monospace, monospace',
            fontSize: 12,
            lineHeight: 1.45,
            maxWidth: 240,
            boxShadow: '0 6px 18px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04)',
            transform: 'rotate(-1deg)',
            zIndex: 5,
            ...style,
          }}
        >
          {children}
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection
            id="intro"
            title="Ashwin Murugan — Personal Site"
            subtitle="Three full landing-page directions. Drag to reorder · click any artboard's expand icon for fullscreen review."
          >
            <DCArtboard
              id="dir-a"
              label="A · Stellar Cartographer"
              width={1440}
              height={4700}
            >
              <DirectionA />
            </DCArtboard>

            <DCArtboard
              id="dir-b"
              label="B · Mission Telemetry"
              width={1440}
              height={4400}
            >
              <DirectionB />
            </DCArtboard>

            <DCArtboard
              id="dir-c"
              label="C · Aerospace Editorial"
              width={1440}
              height={5200}
            >
              <DirectionC />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
