<body data-screen-label="Awards">
  <div id="root"></div>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "cobalt",
      "bgScheme": "twilight",
      "hero": "constellation",
      "bodyFont": "sans",
      "density": "standard",
      "starfield": 1.4,
      "shooting": true
    }/*EDITMODE-END*/;

  <script type="text/babel" src="tweaks-panel.js"></script>
  <script type="text/babel" src="site-hero.js"></script>
  <script type="text/babel" src="site-sections.js"></script>
  <script type="text/babel" src="site-shell.js"></script>

  <script type="text/babel">
    const heroData = {
      index: "IV",
      eyebrow: "Honours",
      title: <span dangerouslySetInnerHTML={{ __html: "Hardware on <em>the shelf.</em>" }} />,
      subtitle: "Fellowships, prizes, and competitions — most of which I am still slightly surprised by.",
      meta: (
        <>
          <span>08 HONOURS</span>
          <span>NDSEG · KVPY · UN MILLENNIUM</span>
          <span>2021 → 2026</span>
        </>
      ),
    };

    ReactDOM.createRoot(document.getElementById('root')).render(
      <SubpageApp active="awards" hero={heroData} footerNote="FIELD IV · END">
        <Awards headless={true} />
      </SubpageApp>
    );
