<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ashwin Murugan — CV</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Serif+Pro:ital,wght@0,300;0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
  />
  <link rel="stylesheet" href="site.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body data-screen-label="CV">
  <div id="root"></div>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "cobalt",
      "bgScheme": "twilight",
      "hero": "constellation",
      "bodyFont": "sans",
      "density": "standard",
      "starfield": 1.4,
      "shooting": true
    }/*EDITMODE-END*/;
  </script>

  <script type="text/babel" src="tweaks-panel.js"></script>
  <script type="text/babel" src="site-hero.js"></script>
  <script type="text/babel" src="site-sections.js"></script>
  <script type="text/babel" src="site-shell.js"></script>

  <script type="text/babel">
    const heroData = {
      index: "VI",
      eyebrow: "CV",
      title: <span dangerouslySetInnerHTML={{ __html: "The full <em>record.</em>" }} />,
      subtitle: "Research CV — aerospace, propulsion, and the work in between.",
      meta: (
        <>
          <span>LAST UPDATED 2026</span>
          <span>MIT AEROASTRO</span>
          <span>NDSEG FELLOW</span>
        </>
      ),
    };

    function CVPage() {
      return (
        <SubpageApp active="cv" hero={heroData} footerNote="FIELD VI · END">
          <CV />
        </SubpageApp>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CVPage />);
  </script>
</body>
</html>
